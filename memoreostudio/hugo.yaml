baseURL: "https://memoreostudio.netlify.app"
languageCode: "en-us"
title: "Memoreo Studio"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

menus:
  main:
    - identifier: gallery
      name: Portfolio
      url: /gallery/
      weight: 1
    - identifier: Price
      name: Price
      url: /#achievements
      weight: 2

params:
  title: "Memoreo Studio"
  description: "Capture the feeling, keep the memory. London-based Portrait & Lifestyle Photographer"
  useBootstrapCDN: false
  mathjax: false
  animate: true
  favicon: "/fav.png"

  navbar:
    align: ms-auto
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: true
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero Section
  hero:
    enable: true
    intro: "Welcome to"
    title: "Memoreo Studio."
    subtitle: "Professional Photography & Storytelling in London."
    content: "Capture the feeling, keep the memory. With Memoreo. <br> **London-based Portrait & Lifestyle Photography Service**"
    image: /images/wedding-photo.jpg
    bottomImage:
      enable: true
    button:
      enable: true
      name: "View Portfolio"
      url: "/gallery"
      newPage: false

   # Services
  achievements:
    enable: true
    title: "Choose the perfect session for your London story."
    items:
      - title: Graduation
        content: |-
          Celebrate your academic milestone with a cinematic touch. From iconic campus landmarks to classic London views, I’ll capture your achievement in a way that feels both timeless and personal.
        image: /images/Graduation.jpg
        url: graduation
      - title: Portraits
        content: |-
          Tailored lifestyle sessions designed to reflect your true self. Whether it’s a solo adventure, a couple's story, or family memories, we’ll explore London’s hidden gems to create art out of your everyday moments.
        image: /images/portrait.jpg
        url: portrait
      - title: Wedding 
        content: |-
          Timeless storytelling for your most special day. I focus on the raw emotions, candid smiles, and the intimate details of your ceremony, ensuring every chapter of your love story is beautifully preserved.
        image: /images/wedding.jpg
        url: wedding

  # About Section
  about:
    enable: true
    title: "About us"
    subtitle: "Why Choose Memoreo Studio?"
    content: |-
      Finding a photographer in a big city like London can be overwhelming. I aim to make your experience as easy and enjoyable as possible.

      I focus on capturing the genuine emotions and the timeless beauty of London's streets, ensuring your memories are preserved forever with a professional and friendly touch.
    skills:
      enable: true
      title: "Our Commitment to You:"
      items:
        - "Tailored Experience: Every shoot is unique and planned around your vision."
        - "Fast & Reliable: Guaranteed 7-day turnaround for all edited shots."
        - "Local Knowledge: Expertise in finding the best spots and times to avoid crowds."
        - "Natural Aesthetic: Focused on authentic smiles and beautiful natural light."
      
    

  # Contact Section
  contact:
    enable: true
    title: "Contact"
    content: |-
      Every session is designed to be relaxed, fun, and tailored to your needs. 
      I know the best "hidden gems" in London to ensure your photos stand out. 
      My inbox is always open!
    btnName: Mail me
    btnLink: mailto:emily.emmimi@gmail.com
 
  footer:
    socialNetworks:
      instagram: https://instagram.com/memoreo.studio
      facebook: https://facebook.com/memoreostudio

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    pageNotFound: "Page not found"
    emailText: "Check out this site"

  datesFormat:
    article: "May 8, 2026"
    articleList: "May 8, 2026"
    articleRecent: "May 8, 2026"